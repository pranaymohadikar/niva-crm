async function submitDialogComment(patientId) {
  const ta = document.getElementById('cmtDialogText');
  const text = ta.value.trim();
  if(!text) { toast('Write a comment first', false); return; }
  try {
    const res = await apiPost('/api/comments', {
      patient_id: parseInt(patientId), text, user: getUser(), role: getRole()
    });
    const p = pat(patientId);
    if(p) {
      p.comments = p.comments || [];
      p.comments.unshift({id:res.id, user:getUser(), role:getRole(), text, created_at:res.created_at});

    document.getElementById('cmtDialog')?.remove();
    document.getElementById('cmtBackdrop')?.remove();
    loadNotifications();

  } catch(e) { toast('Failed: '+e.message, false); }

function setupMentionAutocomplete(textarea, dropdownId) {
  let mentionActive = false;
  let activeIdx = 0;

  textarea.addEventListener('input', function() {
    const val = this.value;
    const cursor = this.selectionStart;
    let atPos = -1;
    for(let i = cursor - 1; i >= 0; i--) {
      if(val[i] === '@') { if(i === 0 || /\s/.test(val[i-1])) { atPos = i; } break; }
      if(/\s/.test(val[i])) break;
    }
    const dd = document.getElementById(dropdownId);
    if(!dd) return;
    if(atPos === -1) { dd.classList.remove('open'); mentionActive = false; return; }
    const query = val.substring(atPos+1, cursor).toLowerCase();
    const matches = allUsers.filter(u => {
      if(u.name === getUser()) return false;
      return u.name.toLowerCase().includes(query) || u.role.toLowerCase().includes(query);
    }).slice(0, 6);
    if(!matches.length) { dd.classList.remove('open'); mentionActive = false; return; }
    mentionActive = true;
    activeIdx = 0;
    dd.innerHTML = matches.map((u,i) =>
      `<div class="mention-opt ${i===0?'active':''}" data-name="${esc(u.name)}" onmousedown="insertMention(this,'${dropdownId}')">
        <span class="mo-name">${esc(u.name)}</span><span class="mo-role">${u.role}</span>
      </div>`).join('');
    dd.classList.add('open');
  });

  textarea.addEventListener('keydown', function(e) {
    if(!mentionActive) return;
    const dd = document.getElementById(dropdownId);
    const opts = dd?.querySelectorAll('.mention-opt');
    if(!opts || !opts.length) return;
    if(e.key === 'ArrowDown') {
      e.preventDefault();
      opts[activeIdx].classList.remove('active');
      activeIdx = (activeIdx + 1) % opts.length;
      opts[activeIdx].classList.add('active');
      opts[activeIdx].scrollIntoView({block:'nearest'});
    } else if(e.key === 'ArrowUp') {
      e.preventDefault();
      opts[activeIdx].classList.remove('active');
      activeIdx = (activeIdx - 1 + opts.length) % opts.length;
      opts[activeIdx].classList.add('active');
      opts[activeIdx].scrollIntoView({block:'nearest'});
    } else if(e.key === 'Enter' || e.key === 'Tab') {
      if(mentionActive && opts.length) { e.preventDefault(); insertMention(opts[activeIdx], dropdownId); }
    } else if(e.key === 'Escape') {
      dd.classList.remove('open'); mentionActive = false;
    }
  });

  textarea.addEventListener('blur', function() {
    setTimeout(() => { document.getElementById(dropdownId)?.classList.remove('open'); mentionActive = false; }, 150);
  });
}

function insertMention(el, dropdownId) {
  const name = el.getAttribute('data-name');
  const dd = document.getElementById(dropdownId);
  const ta = dd?.parentElement?.querySelector('textarea');
  if(!ta) return;
  const val = ta.value;
  const cursor = ta.selectionStart;
  let atPos = -1;
  for(let i = cursor - 1; i >= 0; i--) {
    if(val[i] === '@') { atPos = i; break; }
    if(/\s/.test(val[i])) break;
  }
  if(atPos === -1) return;
  const firstName = name.split(' ')[0];
  const before = val.substring(0, atPos);
  const after = val.substring(cursor);
  ta.value = before + '@' + firstName + ' ' + after;
  ta.selectionStart = ta.selectionEnd = before.length + firstName.length + 2;
  dd.classList.remove('open');
  ta.focus();
}

function closeSP(id) {
  const el = document.getElementById(id);
  if(el) el.classList.remove('open');
  selectedPatientId = null;
}
